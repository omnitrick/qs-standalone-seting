<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS Controller Dashboard</title>
    <style>
        /* TEMA WARNA & FONT */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Roboto:wght@400;700&display=swap');
        
        :root { 
            --bg-main: #13151a; 
            --bg-card: #1c2027; 
            --bg-input: #0e1014;
            --text-main: #8a95a5; 
            --text-light: #e2e8f0; 
            --accent-orange: #ff6b00; 
            --accent-red: #ff4757; 
            --accent-green: #2ed573;
            --border-color: #2c323e;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            margin: 0; 
            padding: 15px; 
            padding-bottom: 40px;
        }

        /* HEADER APP */
        .app-header {
            display: flex;
            align-items: center;
            padding: 10px 0 20px 0;
            border-bottom: 2px solid var(--accent-orange);
            margin-bottom: 20px;
        }
        .app-icon {
            background: var(--accent-orange);
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            margin-right: 15px;
        }
        .app-title h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
        .app-title p { margin: 2px 0 0 0; font-size: 0.75rem; color: var(--text-main); font-family: 'JetBrains Mono', monospace;}
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background-color: var(--accent-red);
            margin-left: auto;
            box-shadow: 0 0 8px var(--accent-red);
        }

        /* WARNING BOX */
        .warning-box {
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.3);
            color: #d88147;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.4;
            font-family: 'JetBrains Mono', monospace;
        }

        /* CARD STYLE */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent-orange);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }
        .card-title::before {
            content: "";
            display: inline-block;
            width: 3px;
            height: 14px;
            background: var(--accent-orange);
            margin-right: 8px;
        }

        /* BIG MONITOR DISPLAY */
        .monitor-display {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
        .monitor-grid {
            display: flex;
            justify-content: space-between;
            text-align: center;
        }
        .monitor-box { flex: 1; }
        .monitor-box:first-child { border-right: 1px solid var(--border-color); }
        .monitor-label { font-size: 0.75rem; color: var(--text-main); font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
        .monitor-value { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 2.8rem; 
            font-weight: bold; 
            color: var(--accent-green); 
            text-shadow: 0 0 10px rgba(46, 213, 115, 0.2);
        }
        .monitor-status {
            font-size: 0.8rem;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            text-align: left;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        /* BUTTONS */
        .btn-group { display: flex; gap: 10px; }
        .btn {
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-orange { background: var(--accent-orange); color: white; }
        .btn-dark { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-dark:disabled { opacity: 0.5; cursor: not-allowed; }
        .w-100 { width: 100%; margin-top: 10px; }

        /* INPUT SETTINGS */
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .input-row label {
            color: var(--text-main);
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            flex: 1;
        }
        .input-row input, .input-row select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            width: 140px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            text-align: center;
            transition: color 0.3s ease;
        }
        .input-row input:focus, .input-row select:focus { outline: 1px solid var(--accent-orange); }

        /* LOG TERMINAL */
        .log-box {
            background: var(--bg-input);
            color: var(--accent-green);
            font-family: 'JetBrains Mono', monospace;
            padding: 12px;
            height: 120px;
            overflow-y: scroll;
            border-radius: 8px;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-icon">⚡</div>
        <div class="app-title">
            <h1>penganguran tek</h1>
            <p>Quick Shifter</p>
        </div>
        <div class="status-dot" id="headerDot"></div>
    </header>

    <div class="warning-box">
        ⚠ jare kasdi nak butuhmu pasir aku yo butuh
    </div>

    <div class="card">
        <div class="card-title">MONITOR</div>
        <div class="monitor-display">
            <div class="monitor-grid">
                <div class="monitor-box">
                    <div class="monitor-label">RPM ENGINE</div>
                    <div class="monitor-value" id="rpmVal">-</div>
                </div>
                <div class="monitor-box">
                    <div class="monitor-label">SENSOR ADC</div>
                    <div class="monitor-value" id="sensVal">-</div>
                </div>
            </div>
            <div class="monitor-status" id="monitorText">Belum terhubung...</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">KONEKSI MODUL</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-main); margin-bottom: 15px;">
            Status: <span id="bleState">Belum terhubung koyo cintamu</span>
        </div>
        <div class="btn-group">
            <button id="connectBtn" class="btn btn-orange">🔍 Scan modul</button>
            <button id="disconnectBtn" class="btn btn-dark" disabled>✕ Putus cintamu</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">QUICK SHIFTER aktif</div>
        <div class="input-row">
            <label>Trigger</label>
            <input type="number" id="targetVal" placeholder="Misal: 1900" data-cmd="SETVAL">
        </div>
        <div class="input-row" style="margin-top: 15px;">
            <select id="shiftMode" style="width: 100%;" data-cmd="M">
                <option value="0">⬇ TEKAN / Compression</option>
                <option value="1">⬆ TARIK / Tension</option>
            </select>
        </div>
        <button class="btn btn-dark w-100" onclick="sendCmd('RECAL')">↻ Kalibrasi Ulang Sensor adc</button>
    </div>

    <div class="card">
        <div class="card-title">CUT DURATION QS</div>
        <div class="input-row"><label>1000 - 4000</label><input type="number" id="c1" placeholder="ms" data-cmd="C1:"></div>
        <div class="input-row"><label>4000 - 6000</label><input type="number" id="c2" placeholder="ms" data-cmd="C2:"></div>
        <div class="input-row"><label>6000 - 8000</label><input type="number" id="c3" placeholder="ms" data-cmd="C3:"></div>
        <div class="input-row"><label>8k - 10k</label><input type="number" id="c4" placeholder="ms" data-cmd="C4:"></div>
        <div class="input-row"><label>10k - 12k</label><input type="number" id="c5" placeholder="ms" data-cmd="C5:"></div>
        <div class="input-row"><label>12k - 14k</label><input type="number" id="c6" placeholder="ms" data-cmd="C6:"></div>
        <div class="input-row"><label>14k+ RPM</label><input type="number" id="c7" placeholder="ms" data-cmd="C7:"></div>
    </div>

    <div class="card">
        <div class="card-title">PIT LIMITER</div>
        <div class="input-row"><label>Limit RPM</label><input type="number" id="pl" placeholder="RPM" data-cmd="PL"></div>
        <div class="input-row"><label>Cut off.</label><input type="number" id="pd" placeholder="ms" data-cmd="PD"></div>
        <div class="input-row"><label>Rest on.</label><input type="number" id="pr" placeholder="ms" data-cmd="PR"></div>
    </div>

    <div class="card">
        <div class="card-title">TERMINAL LOG</div>
        <div class="btn-group">
            <button class="btn btn-dark" onclick="sendCmd('INFO')">Data loger qs</button>
            <button class="btn btn-dark" onclick="sendCmd('PI')">Info PIT</button>
        </div>
        <div class="log-box" id="terminal"></div>
    </div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const RX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; 
        const TX_UUID      = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"; 

        let bleDevice, rxCharacteristic, txCharacteristic;

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const bleState = document.getElementById('bleState');
        const headerDot = document.getElementById('headerDot');
        const monitorText = document.getElementById('monitorText');
        const terminal = document.getElementById('terminal');
        const rpmVal = document.getElementById('rpmVal');
        const sensVal = document.getElementById('sensVal');

        function logToTerminal(text) {
            terminal.innerHTML += `<div>> ${text}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateConnectionUI(connected, msg) {
            if (connected) {
                bleState.innerText = msg;
                bleState.style.color = "var(--accent-green)";
                headerDot.style.backgroundColor = "var(--accent-green)";
                headerDot.style.boxShadow = "0 0 8px var(--accent-green)";
                monitorText.innerText = "Monitoring Aktif...";
                connectBtn.disabled = true;
                connectBtn.classList.replace('btn-orange', 'btn-dark');
                disconnectBtn.disabled = false;
                disconnectBtn.classList.replace('btn-dark', 'btn-orange');
            } else {
                bleState.innerText = msg;
                bleState.style.color = "var(--text-main)";
                headerDot.style.backgroundColor = "var(--accent-red)";
                headerDot.style.boxShadow = "0 0 8px var(--accent-red)";
                monitorText.innerText = "Belum terhubung...";
                rpmVal.innerText = "-";
                sensVal.innerText = "-";
                connectBtn.disabled = false;
                connectBtn.classList.replace('btn-dark', 'btn-orange');
                disconnectBtn.disabled = true;
                disconnectBtn.classList.replace('btn-orange', 'btn-dark');
            }
        }

        connectBtn.addEventListener('click', async () => {
            try {
                updateConnectionUI(false, "Meminta akses...");
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_QS_Mini' }],
                    optionalServices: [SERVICE_UUID]
                });

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                updateConnectionUI(false, "Menghubungkan...");
                
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                rxCharacteristic = await service.getCharacteristic(RX_UUID);
                txCharacteristic = await service.getCharacteristic(TX_UUID);

                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                updateConnectionUI(true, "Terkoneksi");
                logToTerminal("Bluetooth Berhasil Terkoneksi!");
            } catch (error) {
                console.error(error);
                updateConnectionUI(false, "Gagal koneksi");
            }
        });

        disconnectBtn.addEventListener('click', () => {
            if (!bleDevice) return;
            if (bleDevice.gatt.connected) bleDevice.gatt.disconnect();
        });

        function onDisconnected() {
            updateConnectionUI(false, "Terputus");
            logToTerminal("Perangkat terputus.");
        }

        // ========================================================
        // LOGIKA AUTO-TYPE & DELAY (GAUSAH PEJET ENTER)
        // ========================================================
        let debounceTimers = {};

        document.querySelectorAll('input[data-cmd], select[data-cmd]').forEach(input => {
            input.addEventListener('input', (e) => {
                const el = e.target;
                const cmdPrefix = el.getAttribute('data-cmd');
                
                // Hapus hitungan mundur sebelumnya jika masih mengetik
                clearTimeout(debounceTimers[el.id]);
                
                // Langsung ubah warna jadi MERAH tanda sedang diedit/belum tersimpan
                el.style.color = "var(--accent-red)";
                
                // Tunggu 0.8 detik setelah selesai mengetik, lalu kirim otomatis
                debounceTimers[el.id] = setTimeout(() => {
                    sendSetting(cmdPrefix + el.value, el.id);
                }, 800); 
            });
        });

        async function sendSetting(command, inputId) {
            const inputElement = document.getElementById(inputId);
            if (inputElement && inputElement.value !== "") {
                inputElement.style.color = "var(--accent-red)"; // Pastikan tetap merah saat ngirim
                await sendCmd(command);
            }
        }

        // ========================================================
        // LOGIKA PARSING/MENANGKAP TEKS DARI ESP32
        // ========================================================
        const setVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = val; };

        function handleNotifications(event) {
            let value = event.target.value;
            let decoder = new TextDecoder('utf-8');
            let text = decoder.decode(value).trim();

            // 1. Parsing RPM dan Sensor
            if (text.includes("RPM:") && text.includes("Sens:")) {
                let rpmMatch = text.match(/RPM:\s*(\d+)/);
                let sensMatch = text.match(/Sens:\s*(\d+)/);
                
                if (rpmMatch) rpmVal.innerText = rpmMatch[1];
                if (sensMatch) sensVal.innerText = sensMatch[1];
                
                if (text.includes("[PIT ON]")) {
                    rpmVal.style.color = "var(--accent-red)";
                    monitorText.innerText = "⚠ PIT LIMITER AKTIF!";
                    monitorText.style.color = "var(--accent-red)";
                } else {
                    rpmVal.style.color = "var(--accent-green)";
                    monitorText.innerText = "Monitoring Aktif...";
                    monitorText.style.color = "var(--text-main)";
                }
            } 
            // 2. Jika sukses tersimpan, KEMBALIKAN SEMUA WARNA JADI PUTIH
            else if (text.includes("=== SETTING PERMANEN TERSIMPAN ===")) {
                document.querySelectorAll('input, select').forEach(el => {
                    if (el.value !== "") el.style.color = "#fff";
                });
                logToTerminal("INFO: Data Tersimpan di EEPROM.");
            } 
            // 3. AUTO-FILL DATA BAR DARI ESP32 (Sistem Baru Auto-Sync)
            else if (text.includes("Threshold :")) setVal('targetVal', text.split(":")[1].trim());
            else if (text.includes("ShiftMode :")) setVal('shiftMode', text.split(":")[1].trim());
            else if (text.includes("Pit Limit :")) setVal('pl', text.split(":")[1].trim());
            else if (text.includes("Pit Cut   :")) setVal('pd', text.split(":")[1].trim());
            else if (text.includes("Pit Rest  :")) setVal('pr', text.split(":")[1].trim());
            
            else if (text.includes("C1:1k-4k")) setVal('c1', text.split(":")[2].trim());
            else if (text.includes("C2:4k-6k")) setVal('c2', text.split(":")[2].trim());
            else if (text.includes("C3:6k-8k")) setVal('c3', text.split(":")[2].trim());
            else if (text.includes("C4:8k-10k")) setVal('c4', text.split(":")[2].trim());
            else if (text.includes("C5:10k-12k")) setVal('c5', text.split(":")[2].trim());
            else if (text.includes("C6:12k-14k")) setVal('c6', text.split(":")[2].trim());
            else if (text.includes("C7:14k+")) setVal('c7', text.split(":")[2].trim());

            // 4. AUTO-FILL DARI TOMBOL "INFO" (Sistem Lama)
            else if (text.includes("Cut 1k-4k")) setVal('c1', parseInt(text.split(":")[1]));
            else if (text.includes("Cut 4k-6k")) setVal('c2', parseInt(text.split(":")[1]));
            else if (text.includes("Cut 6k-8k")) setVal('c3', parseInt(text.split(":")[1]));
            else if (text.includes("Cut 8k-10k")) setVal('c4', parseInt(text.split(":")[1]));
            else if (text.includes("Cut 10k-12k")) setVal('c5', parseInt(text.split(":")[1]));
            else if (text.includes("Cut 12k-14k")) setVal('c6', parseInt(text.split(":")[1]));
            else if (text.includes("Cut 14k+")) setVal('c7', parseInt(text.split(":")[1]));
            
            else {
                logToTerminal(text); // Tampilkan sisanya ke layar hitam
            }
        }

        async function sendCmd(command) {
            if (!rxCharacteristic) return alert("Bluetooth belum terkoneksi!");
            try {
                let encoder = new TextEncoder('utf-8');
                await rxCharacteristic.writeValue(encoder.encode(command));
                logToTerminal("TX: " + command);
            } catch (error) {
                logToTerminal("Gagal TX: " + error);
            }
        }
    </script>
</body>
</html>
